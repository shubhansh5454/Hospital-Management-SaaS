user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging Parameters
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Performance Tuning & I/O
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off; # Hide Nginx version from potential attackers

    # Client payload boundaries (Supports large backup exports and clinical images)
    client_max_body_size 100M;
    client_body_buffer_size 128k;

    # Gzip Compression Tuning
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Upstream Backend Server Definition
    upstream app_upstream {
        server app:3000;
        keepalive 32;
    }

    # ==============================================================================
    # 1. HTTP Server - Port 80 (Forwards to HTTPS and solves ACME Challenges)
    # ==============================================================================
    server {
        listen 80;
        listen [::]:80;
        server_name localhost; # Replace with your real domain (e.g. clinic.caresync.io)

        # Let's Encrypt Certbot ACME HTTP validation challenge path
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }

        # Global Redirect to TLS secure channel
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ==============================================================================
    # 2. HTTPS Server - Port 443 (SSL/TLS termination + Reverse Proxy)
    # ==============================================================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name localhost; # Replace with your real domain

        # SSL Certificates (Managed via Certbot or custom local self-signed)
        # Note: If certs are not yet provisioned, configure dummy certs first
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # TLS Hardening (SSL Labs A+ Compliant)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        
        # Session parameters
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # HSTS (Strict-Transport-Security) - Forces browsers to always use HTTPS
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always; # Mitigate Clickjacking
        add_header X-XSS-Protection "1; mode=block" always; # Mitigate Cross-site Scripting
        add_header X-Content-Type-Options "nosniff" always; # Mitigate MIME sniffing
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval'; img-src 'self' https: data: blob:; connect-src 'self' https: wss:;" always;

        # Proxy location matching frontend static pages & API
        location / {
            proxy_pass http://app_upstream;
            proxy_http_version 1.1;
            
            # WebSocket and persistent HTTP connection headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Standard request proxy parameters
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Proxy buffer optimizations
            proxy_buffers 16 16k;
            proxy_buffer_size 32k;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Optimized static content caching
        location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff|woff2|webp)$ {
            proxy_pass http://app_upstream;
            proxy_set_header Host $host;
            expires 30d;
            add_header Cache-Control "public, no-transform";
            access_log off;
        }
    }
}
